services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: guideflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
      POSTGRES_DB: guideflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5470:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U guideflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
